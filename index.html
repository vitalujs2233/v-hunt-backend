<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* ПОЛНЫЙ ДИЗАЙН БЕЗ ВНЕШНИХ БИБЛИОТЕК */
body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
.app { padding: 20px; }

/* Шапка */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
.logo span { color: #00ff41; }

/* Статус */
.status { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; background: #555; border-radius: 50%; }
.dot.online { background: #00ff41; box-shadow: 0 0 10px #00ff41; }

/* Карточка цели */
.card {
background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
border: 1px solid #222;
border-radius: 25px;
padding: 25px;
margin-bottom: 30px;
position: relative;
}
.card-tag { position: absolute; top: 20px; right: 20px; background: rgba(0,255,65,0.1); color: #00ff41; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
.coin-icon { width: 45px; height: 45px; background: #fff; color: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-bottom: 15px; }
.coin-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
.coin-info { font-size: 12px; color: #666; margin-bottom: 20px; }
.hunt-btn { background: #00ff41; color: #000; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 14px; cursor: pointer; }

/* Сетка бирж */
.grid { display: grid; grid-cols: 2; display: flex; gap: 15px; }
.exchange { flex: 1; background: #111; border: 1px solid #222; padding: 20px; border-radius: 20px; text-align: center; }
.exchange img { width: 30px; margin-bottom: 10px; opacity: 0.5; }
.exchange-name { font-size: 12px; font-weight: bold; color: #888; }

/* Нижнее меню */
.nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); height: 70px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #333; }
.nav-item { text-align: center; color: #555; font-size: 10px; font-weight: bold; }
.nav-item.active { color: #00ff41; }
</style>
</head>
<body>
<div class="app">
<div class="header">
<div>
<div class="logo">V-HUNT <span>$</span></div>
<div class="status"><div class="dot online"></div> Satellite Linked</div>
</div>
<div style="width:40px; height:40px; background:#111; border-radius:50%; border:1px solid #222;"></div>
</div>

<div style="font-size: 10px; color: #444; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;">Приоритетные цели</div>

<div class="card">
<div class="card-tag">NEW LISTING</div>
<div class="coin-icon">BNB</div>
<div class="coin-name">BabyDoge / USDT</div>
<div class="coin-info">Ожидание листинга: 02:14:55</div>
<button class="hunt-btn" onclick="alert('Охота началась!')">ВЗЯТЬ В ПРИЦЕЛ</button>
</div>

<div style="font-size: 10px; color: #444; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;">Радары бирж</div>
<div class="grid">
<div class="exchange" style="border-bottom: 2px solid #00ff41;">
<div style="font-size: 20px; margin-bottom: 5px;">🔥</div>
<div class="exchange-name">BYBIT</div>
</div>
<div class="exchange">
<div style="font-size: 20px; margin-bottom: 5px;">💎</div>
<div class="exchange-name">BINANCE</div>
</div>
</div>
</div>

<div class="nav">
<div class="nav-item active">HUNT</div>
<div class="nav-item">FEED</div>
<div class="nav-item">PRO</div>
</div>
</body>
</html>
