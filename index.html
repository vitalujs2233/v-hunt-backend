<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>V-HUNT</title>
<!-- Подключаем стили напрямую для надежности -->
<script src="https://tailwindcss.com"></script>
<script src="https://unpkg.com"></script>
<style>
/* Базовый "дорогой" фон сразу */
body {
background-color: #050505 !important;
color: white !important;
font-family: sans-serif;
margin: 0;
padding: 0;
}
.glass-card {
background: rgba(255, 255, 255, 0.05);
backdrop-filter: blur(10px);
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.1);
}
.green-glow {
box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
}
.no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="pb-24 bg-black text-white">

<!-- HEADER -->
<div class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
<div>
<h1 class="text-2xl font-black tracking-tighter uppercase">V-HUNT <span class="text-green-500">$</span></h1>
<div id="status" class="text-[10px] text-gray-500 font-bold flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-pulse"></span> CONNECTING TO API...
</div>
</div>
<div class="w-10 h-10 glass-card flex items-center justify-center">
<i data-lucide="user" class="w-5 h-5"></i>
</div>
</div>

<!-- HOT HUNTS SLIDER -->
<div class="px-6 mb-8">
<h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Горячие цели</h2>
<div class="flex gap-4 overflow-x-auto no-scrollbar">
<!-- Card 1 -->
<div class="min-w-[85%] p-6 glass-card green-glow relative overflow-hidden bg-gradient-to-br from-green-500/10 to-transparent">
<div class="flex justify-between items-start mb-6">
<div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center font-bold">BNB</div>
<span class="bg-green-500 text-black text-[10px] font-extrabold px-2 py-1 rounded-md">LIVE NOW</span>
</div>
<div class="text-xl font-bold mb-1">Binance Listing</div>
<div class="text-sm text-gray-400 mb-4">New Token Alert</div>
<button class="w-full py-3 bg-green-500 text-black font-black rounded-xl text-sm active:scale-95 transition-all">ВЗЯТЬ В ПРИЦЕЛ</button>
</div>
</div>
</div>

<!-- EXCHANGES -->
<div class="px-6 mb-8">
<h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Биржи</h2>
<div class="grid grid-cols-2 gap-4">
<div class="p-6 glass-card flex flex-col items-center gap-3 active:scale-95 transition-all">
<i data-lucide="layers" class="text-yellow-500 w-8 h-8"></i>
<span class="font-bold">Binance</span>
</div>
<div class="p-6 glass-card flex flex-col items-center gap-3 active:scale-95 transition-all border-b-2 border-green-500">
<i data-lucide="shield-check" class="text-orange-500 w-8 h-8"></i>
<span class="font-bold">ByBit</span>
</div>
</div>
</div>

<!-- TAB BAR -->
<div class="fixed bottom-0 w-full h-20 bg-black/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-4 z-50">
<div class="flex flex-col items-center gap-1 text-green-500">
<i data-lucide="radar" class="w-6 h-6"></i>
<span class="text-[10px] font-bold">HUNT</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-600">
<i data-lucide="bell" class="w-6 h-6"></i>
<span class="text-[10px] font-bold">ALERTS</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-600">
<i data-lucide="gem" class="w-6 h-6"></i>
<span class="text-[10px] font-bold">PREMIUM</span>
</div>
</div>

<script>
lucide.createIcons();

// Тест твоего бэкенда
const API = 'https://railway.app';
fetch(API + '/status').then(res => {
if(res.ok) document.getElementById('status').innerHTML = '<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> API ONLINE';
}).catch(e => {
document.getElementById('status').innerHTML = '<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> SERVER ERROR';
});
</script>
</body>
</html>
