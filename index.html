<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>V-HUNT</title>
<style>
/* ВЕСЬ ДИЗАЙН ТУТ - НИЧЕГО НЕ ОТВАЛИТСЯ */
:root { --green: #00ff41; --bg: #000000; --card: #111111; }
body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

/* ШАПКА */
.header { padding: 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
.logo { font-size: 24px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
.logo span { color: var(--green); }
.status { font-size: 9px; color: var(--green); font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; margin-top: 4px; }
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

/* БОЛЬШАЯ КАРТОЧКА ЦЕЛИ */
.main-card { margin: 10px 20px 30px; background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid #222; border-radius: 32px; padding: 25px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.badge { position: absolute; top: 0; right: 0; background: var(--green); color: black; font-size: 10px; font-weight: 900; padding: 6px 15px; border-bottom-left-radius: 20px; }
.coin-logo { width: 50px; height: 50px; background: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 900; margin-bottom: 20px; font-size: 14px; }
.title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #666; margin-bottom: 25px; font-weight: 600; }
.btn { background: var(--green); color: black; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.1s; }
.btn:active { transform: scale(0.96); }

/* СЕТКА БИРЖ */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
.exchange-box { background: #0f0f0f; border: 1px solid #1a1a1a; padding: 20px; border-radius: 24px; text-align: center; }
.exchange-box.active { border-bottom: 3px solid var(--green); }
.ex-icon { font-size: 24px; margin-bottom: 10px; display: block; }
.ex-name { font-size: 11px; font-weight: 900; color: #888; letter-spacing: 1px; }

/* НИЖНЕЕ МЕНЮ (Floating) */
.navbar { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(18,18,18,0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
.nav-item { text-align: center; color: #444; font-size: 9px; font-weight: 800; text-transform: uppercase; }
.nav-item.active { color: var(--green); }
.nav-icon { font-size: 22px; margin-bottom: 2px; display: block; }
</style>
</head>
<body>

<div class="header">
<div>
<div class="logo">V-HUNT <span>$</span></div>
<div class="status"><div class="dot"></div> Satellite Linked</div>
</div>
<div style="width: 44px; height: 44px; background: #111; border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
</div>

<div style="font-size: 10px; color: #444; font-weight: 900; letter-spacing: 3px; padding-left: 25px; margin-bottom: 15px; text-transform: uppercase;">Приоритетные цели</div>

<div class="main-card">
<div class="badge">HOT TARGET</div>
<div class="coin-logo">BNB</div>
<div class="title">BabyDoge / USDT</div>
<div class="subtitle">Binance Listing • Today 15:00</div>
<button class="btn" onclick="vibrate()">Взять в прицел</button>
</div>

<div style="font-size: 10px; color: #444; font-weight: 900; letter-spacing: 3px; padding-left: 25px; margin-bottom: 15px; text-transform: uppercase;">Радары бирж</div>

<div class="grid">
<div class="exchange-box active">
<span class="ex-icon">⚡️</span>
<span class="ex-name">BYBIT</span>
</div>
<div class="exchange-box">
<span class="ex-icon">🔶</span>
<span class="ex-name">BINANCE</span>
</div>
</div>

<div class="navbar">
<div class="nav-item active">
<span class="nav-icon">🎯</span>Hunt
</div>
<div class="nav-item">
<span class="nav-icon">📡</span>Feed
</div>
<div class="nav-item">
<span class="nav-icon">💎</span>Pro
</div>
</div>

<script>
function vibrate() {
if (window.navigator && window.navigator.vibrate) {
window.navigator.vibrate(50);
}
alert('Охота началась! Подключаемся к терминалу...');
}
</script>
</body>
</html>
