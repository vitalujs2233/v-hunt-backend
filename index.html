<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-HUNT</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0b0f1a;
color: white;
}

/* HEADER */
.header {
padding: 20px;
font-size: 24px;
font-weight: bold;
}

/* BANNER */
.banner {
margin: 15px;
padding: 20px;
border-radius: 16px;
background: linear-gradient(135deg,#5f2cff,#00d4ff);
font-size: 16px;
}

/* QUICK BUTTONS */
.quick-buttons {
display: flex;
gap: 10px;
padding: 10px;
}

.quick-buttons button {
flex: 1;
padding: 12px;
border-radius: 10px;
border: none;
background: #1a2235;
color: white;
font-size: 14px;
}

/* SLIDER */
.slider {
display: flex;
overflow-x: auto;
padding: 15px;
gap: 10px;
}

.card {
min-width: 140px;
padding: 20px;
border-radius: 12px;
background: #12192b;
text-align: center;
font-size: 16px;
}

/* BOTTOM NAV */
.bottom-nav {
position: fixed;
bottom: 0;
width: 100%;
background: #0d1322;
display: flex;
justify-content: space-around;
padding: 12px 0;
border-top: 1px solid #1c253a;
}

.bottom-nav div {
font-size: 18px;
}
</style>

</head>

<body>

<div class="header">V-HUNT</div>

<div class="banner">
🚀 Охота за новыми листингами
</div>

<div class="quick-buttons">
<button>🔥 Горячие</button>
<button>🆕 Новые</button>
<button>📊 Тренд</button>
</div>

<div class="slider">
<div class="card">Bybit</div>
<div class="card">OKX</div>
<div class="card">Binance</div>
<div class="card">KuCoin</div>
</div>

<div class="bottom-nav">
<div>🏠</div>
<div>📋</div>
<div>💰</div>
<div>⚙️</div>
</div>

</body>
</html>
