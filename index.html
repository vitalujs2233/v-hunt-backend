<title>V-HUNT | Crypto Hunter</title>
<style>
/* ПРЕМИАЛЬНЫЙ ТЕМНЫЙ ДИЗАЙН */
:root { --green: #00ff41; --bg: #000000; --card: #111111; }
body { background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ШАПКА ПРИЛОЖЕНИЯ */
.header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 100; }
.logo { font-size: 24px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
.logo span { color: var(--green); }
.status { font-size: 9px; color: var(--green); font-weight: bold; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; margin-top: 5px; text-transform: uppercase; }
.dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

/* ГЛАВНАЯ КАРТОЧКА (ЦЕЛЬ) */
.main-card { margin: 10px 20px 30px; background: linear-gradient(145deg, #1a1a1a, #070707); border: 1px solid #222; border-radius: 32px; padding: 25px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.badge { position: absolute; top: 0; right: 0; background: var(--green); color: black; font-size: 10px; font-weight: 900; padding: 7px 15px; border-bottom-left-radius: 20px; text-transform: uppercase; }
.coin-logo { width: 50px; height: 50px; background: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 900; margin-bottom: 20px; font-size: 14px; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
.title { font-size: 22px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.5px; }
.subtitle { font-size: 12px; color: #666; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.btn { background: var(--green); color: black; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 10px 20px rgba(0,255,65,0.2); }
.btn:active { transform: scale(0.96); }

/* СЕТКА БИРЖ */
.grid-label { font-size: 10px; color: #444; font-weight: 900; letter-spacing: 3px; padding-left: 25px; margin-bottom: 15px; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
.ex-box { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 22px; border-radius: 26px; text-align: center; transition: all 0.2s; }
.ex-box.active { border-bottom: 3px solid var(--green); background: #111; }
.ex-icon { font-size: 24px; margin-bottom: 10px; display: block; }
.ex-name { font-size: 11px; font-weight: 900; color: #fff; letter-spacing: 1.5px; }

/* НИЖНЯЯ ПАНЕЛЬ */
.nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(15,15,15,0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(20px); z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
.nav-item { text-align: center; color: #444; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
.nav-item.active { color: var(--green); }
.nav-ico { font-size: 22px; margin-bottom: 3px; display: block; }
</style>

</html>
