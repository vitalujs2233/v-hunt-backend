<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-HUNT</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b0f1a;
color: white;
}

.header {
padding: 20px;
font-size: 24px;
font-weight: bold;
}

.sub {
padding: 0 20px;
opacity: 0.6;
}

.slider {
display: flex;
overflow-x: auto;
gap: 12px;
padding: 20px;
}

.card {
min-width: 120px;
background: #121a2a;
padding: 15px;
border-radius: 14px;
text-align: center;
cursor: pointer;
}

.card img {
width: 40px;
height: 40px;
margin-bottom: 5px;
}

.screen {
display: none;
padding: 20px;
}

.active {
display: block;
}

.listing {
background: #121a2a;
padding: 15px;
margin-top: 10px;
border-radius: 12px;
}

.back {
margin-bottom: 10px;
cursor: pointer;
opacity: 0.7;
}
</style>

</head>
<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="main" class="active">

<div class="header">V-HUNT</div>
<div class="sub">Листинг сканер криптобирж</div>

<div class="slider">
<div class="card" onclick="openExchange('bybit')">
<img src="https://cryptologos.cc/logos/bybit-logo.png">
<div>Bybit</div>
</div>

<div class="card" onclick="openExchange('okx')">
<img src="https://cryptologos.cc/logos/okx-logo.png">
<div>OKX</div>
</div>
</div>

</div>

<!-- ЭКРАН БИРЖИ -->
<div id="exchangeScreen" class="screen">

<div class="back" onclick="back()">← Назад</div>

<h2 id="exchangeTitle"></h2>

<div id="listings"></div>

</div>

<script>

const API = "https://v-hunt-backend-production.up.railway.app/api/listings/live";

function openExchange(exchange) {
document.getElementById("main").classList.remove("active");
document.getElementById("exchangeScreen").classList.add("active");

document.getElementById("exchangeTitle").innerText = exchange.toUpperCase();

loadListings(exchange);
}

function back() {
document.getElementById("main").classList.add("active");
document.getElementById("exchangeScreen").classList.remove("active");
}

async function loadListings(exchange) {
const container = document.getElementById("listings");
container.innerHTML = "Загрузка...";

try {
const res = await fetch(API);
const json = await res.json();

const filtered = json.data.filter(i =>
i.exchange.toLowerCase().includes(exchange)
);

container.innerHTML = "";

if (filtered.length === 0) {
container.innerHTML = "Нет данных";
return;
}

filtered.forEach(item => {
container.innerHTML += `
<div class="listing">
<b>${item.title}</b><br/>
${new Date(item.publishedAt).toLocaleString()}
</div>
`;
});

} catch (e) {
container.innerHTML = "Ошибка загрузки";
}
}

</script>

</body>
</html>
