<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-HUNT</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

.header{
padding:15px;
font-weight:900;
font-size:20px;
}

.exchanges{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.exchange{
min-width:120px;
padding:15px;
background:#111827;
border-radius:12px;
cursor:pointer;
}

.listings{
padding:10px;
}

.card{
background:#111827;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

button{
background:#2563eb;
border:none;
padding:10px;
color:#fff;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">V-HUNT</div>

<div id="home">
<div class="exchanges" id="exchangeList"></div>
</div>

<div id="exchangeScreen" style="display:none">
<button onclick="back()">← Назад</button>
<h2 id="exchangeTitle"></h2>
<div class="listings" id="listings"></div>
</div>

<script>
let allData = [];

async function load(){
const res = await fetch("/api/listings/live");
const data = await res.json();

allData = data.data || [];

renderExchanges();
}

function renderExchanges(){
const exchanges = [...new Set(allData.map(x => x.exchange))];
const root = document.getElementById("exchangeList");

root.innerHTML = exchanges.map(e => `
<div class="exchange" onclick="openExchange('${e}')">
${e}
</div>
`).join("");
}

function openExchange(name){
document.getElementById("home").style.display = "none";
document.getElementById("exchangeScreen").style.display = "block";

document.getElementById("exchangeTitle").innerText = name;

const list = allData.filter(x => x.exchange === name);

document.getElementById("listings").innerHTML = list.map(x => `
<div class="card">
<b>${x.title || "Listing"}</b><br/>
${x.description || ""}<br/><br/>
<button onclick="window.open('${x.url}','_blank')">Open</button>
</div>
`).join("");
}

function back(){
document.getElementById("home").style.display = "block";
document.getElementById("exchangeScreen").style.display = "none";
}

load();
</script>

</body>
</html>
