<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>V-HUNT | Crypto Hunter</title>
<script src="https://tailwindcss.com"></script>
<script src="https://unpkg.com"></script>
<style>
:root { --accent: #00ff41; --bg: #050505; }
body { background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
.glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
.tab-active { color: var(--accent); filter: drop-shadow(0 0 8px rgba(0, 255, 65, 0.4)); }
.no-scrollbar::-webkit-scrollbar { display: none; }
.pulse { animation: pulse-animation 2s infinite; }
@keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
.status-dot { width: 6px; height: 6px; border-radius: 50%; shadow: 0 0 10px currentColor; }
</style>
</head>
<body class="pb-32">

<!-- HEADER -->
<header class="p-6 flex justify-between items-center sticky top-0 bg-[#050505]/80 backdrop-blur-lg z-50">
<div>
<h1 class="text-2xl font-black italic tracking-tighter uppercase">V-HUNT <span class="text-[#00ff41]">$</span></h1>
<div id="api-status" class="flex items-center gap-2 mt-1 transition-all duration-500">
<div class="status-dot bg-gray-500 shadow-[0_0_5px_gray]"></div>
<span class="text-[9px] font-bold uppercase tracking-widest text-gray-500">Checking Satellite...</span>
</div>
</div>
<div class="w-10 h-10 glass flex items-center justify-center active:scale-90 transition-transform">
<i data-lucide="user" class="w-5 h-5 text-gray-300"></i>
</div>
</header>

<!-- MAIN TARGET (DASHBOARD) -->
<main class="px-5 space-y-8">

<!-- HOT LISTING SLIDER -->
<section>
<h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[3px] mb-4 ml-1 text-center">Приоритетные цели</h2>
<div id="listings-container" class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
<!-- Скелет загрузки -->
<div class="min-w-[85%] p-6 glass pulse">
<div class="w-12 h-12 bg-white/10 rounded-xl mb-4"></div>
<div class="h-6 bg-white/10 rounded w-3/4 mb-2"></div>
<div class="h-4 bg-white/10 rounded w-1/2"></div>
</div>
</div>
</section>

<!-- EXCHANGES GRID -->
<section>
<h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[3px] mb-4 ml-1">Радары бирж</h2>
<div class="grid grid-cols-2 gap-4">
<div class="p-5 glass flex flex-col items-center gap-3 active:scale-95 transition-all border-b-2 border-transparent hover:border-yellow-500">
<i data-lucide="component" class="text-yellow-500 w-8 h-8"></i>
<span class="text-xs font-black uppercase">Binance</span>
</div>
<div class="p-5 glass flex flex-col items-center gap-3 active:scale-95 transition-all border-b-2 border-[#00ff41]">
<i data-lucide="zap" class="text-[#00ff41] w-8 h-8"></i>
<span class="text-xs font-black uppercase">ByBit</span>
</div>
</div>
</section>

</main>

<!-- BOTTOM NAV BAR -->
<nav class="fixed bottom-6 left-5 right-5 h-20 glass flex justify-around items-center px-4 z-50">
<div class="flex flex-col items-center gap-1 tab-active">
<i data-lucide="target" class="w-6 h-6"></i>
<span class="text-[9px] font-black uppercase tracking-widest">Hunt</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-500">
<i data-lucide="radar" class="w-6 h-6"></i>
<span class="text-[9px] font-black uppercase tracking-widest">Feed</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-500">
<i data-lucide="shield-check" class="w-6 h-6"></i>
<span class="text-[9px] font-black uppercase tracking-widest">Pro</span>
</div>
</nav>

<!-- SCRIPTS -->
<script src="servis.js"></script>
<script>
// Инициализация иконок
lucide.createIcons();

// Логика отображения
async function startApp() {
const statusIndicator = document.getElementById('api-status');
const container = document.getElementById('listings-container');

// 1. Проверяем связь
const isOnline = await vHuntService.checkStatus();

if (isOnline) {
statusIndicator.innerHTML = `
<div class="status-dot bg-[#00ff41] shadow-[0_0_8px_#00ff41]"></div>
<span class="text-[9px] font-bold uppercase tracking-widest text-[#00ff41]">Satellite Linked</span>
`;

// 2. Грузим данные
const data = await vHuntService.getListings();
if (data && data.length > 0) {
container.innerHTML = data.map(item => `
<div class="min-w-[85%] p-6 glass bg-gradient-to-br from-white/5 to-transparent border-white/10">
<div class="flex justify-between items-start mb-6">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-black font-black text-xs shadow-xl">${item.symbol || 'COIN'}</div>
<div class="bg-[#00ff41]/20 text-[#00ff41] text-[9px] px-2 py-1 rounded-md font-black tracking-tighter underline italic uppercase">${item.exchange || 'LIVE'}</div>
</div>
<div class="text-xl font-black mb-1 tracking-tight">${item.pair || 'Hunting...'}</div>
<div class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-4">Листинг подтвержден</div>
<button class="w-full py-4 bg-[#00ff41] text-black font-black rounded-2xl text-xs uppercase shadow-[0_10px_20px_rgba(0,255,65,0.2)] active:scale-95 transition-all">Снайпить профит</button>
</div>
`).join('');
} else {
container.innerHTML = '<div class="p-6 text-gray-500 text-xs italic text-center w-full uppercase tracking-widest font-bold">Целей пока нет... Ждем анонсов</div>';
}

} else {
statusIndicator.innerHTML = `
<div class="status-dot bg-red-500 shadow-[0_0_8px_red]"></div>
<span class="text-[9px] font-bold uppercase tracking-widest text-red-500">Connection Lost</span>
`;
container.innerHTML = '<div class="p-6 text-red-900/50 text-xs text-center w-full uppercase font-black">Ошибка связи с радаром</div>';
}
}

startApp();
</script>
</body>
</html>
